<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Negocio</title>
  <style>
    body {font-family: Arial; margin:0; background:#f2f2f2;}
    header {background: linear-gradient(45deg,#007BFF,#00c6ff); color:white; text-align:center; padding:30px;}
    nav {background:#333; padding:10px; text-align:center;}
    nav a {color:white; margin:0 15px; text-decoration:none; font-weight:bold;}
    section {padding:20px; max-width:1000px; margin:auto;}
    .grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px;}
    .box {background:white; padding:15px; border-radius:10px;}
    img {width:100%; border-radius:10px;}
    .whatsapp {position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:15px; border-radius:50%; text-decoration:none;}
  </style>
</head>
<body>

<header>
  <h1>Mi Negocio</h1>
  <p>Ventas y servicios</p>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Productos</a>
  <a href="#">Contacto</a>
</nav>

<section>
  <h2>Productos</h2>
  <div class="grid">
    <div class="box">
      <img src="https://via.placeholder.com/300">
      <h3>Producto 1</h3>
      <p>$10</p>
    </div>
    <div class="box">
      <img src="https://via.placeholder.com/300">
      <h3>Producto 2</h3>
      <p>$15</p>
    </div>
  </div>
</section>

<a class="whatsapp" href="https://wa.me/593999999999" target="_blank">💬</a>

</body>
</html>
